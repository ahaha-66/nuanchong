name: ci
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nuanchong
          POSTGRES_USER: nuanchong_migrator
          POSTGRES_PASSWORD: nuanchong_migrator
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U nuanchong_migrator -d nuanchong"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    env:
      DATABASE_URL: postgresql://nuanchong_migrator:nuanchong_migrator@localhost:5432/nuanchong
      JWT_ACCESS_SECRET: ci-secret-at-least-thirty-two-characters
      JWT_REFRESH_PEPPER: ci-pepper-at-least-thirty-two-characters
      AI_USE_FAKE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
